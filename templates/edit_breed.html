{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 pt-5 min-vh-100">
    <div class="card glass-card p-5 mx-auto shadow-lg border-0" style="max-width: 600px;">
        <h2 class="text-white fw-bold mb-4">Edit Breed: {{ breed.breed_name }}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3 text-start">
                <label class="form-label text-white-50 fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <div class="d-flex justify-content-between mt-5">
                <a href="{% url 'custom_admin' %}" class="btn btn-outline-light rounded-pill px-4">Cancel</a>
                <button type="submit" class="btn btn-success rounded-pill px-4 shadow fw-bold">Update Breed</button>
            </div>
        </form>
    </div>
</div>

<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 1rem;
    }
</style>
{% endblock %}
