{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card auth-card shadow-lg p-4">
        <div class="card-body">
            <h2 class="text-center mb-4 fw-bold text-primary">Register</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Create Account</button>
            </form>
            <p class="text-center mt-3">
                Already have an account? <a href="{% url 'login' %}" class="text-info fw-bold">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
